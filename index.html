<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robben Lernen</title>

<link rel="manifest" href="/static/manifest.json">

<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Robbe">

<style>

:root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #0f172a;
    --sub: #64748b;
    --primary: #2563eb;
    --shadow: rgba(15, 23, 42, 0.12);
}

body.dark {
    --bg: #020817;
    --card: #0f172a;
    --text: #f8fafc;
    --sub: #cbd5e1;
    --primary: #3b82f6;
    --shadow: rgba(0,0,0,0.45);
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    text-align: center;
}

header {
    background: var(--card);
    padding: 16px;
    font-size: 24px;
    font-weight: 800;
    box-shadow: 0 2px 8px var(--shadow);
}

.app {
    max-width: 430px;
    margin: 0 auto;
    padding: 20px;
}

.mascot-box {
    background: var(--card);
    border-radius: 28px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 8px 22px var(--shadow);
}

.mascot-layout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
}

.mascot-img {
    width: 210px;
    max-width: 62%;
    animation: sealIdle 2.8s infinite ease-in-out;
}

.speech {
    background: var(--card);
    border-radius: 22px;
    padding: 14px;
    box-shadow: 0 6px 18px var(--shadow);
    font-size: 15px;
    color: var(--sub);
}

.speech strong {
    display: block;
    color: var(--text);
    font-size: 20px;
    margin-bottom: 5px;
}

.level-box,
.stats {
    background: var(--card);
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 8px 22px var(--shadow);
}

.level-title {
    font-size: 28px;
    font-weight: 800;
}

.level-sub {
    color: var(--sub);
    margin-top: 6px;
    font-size: 17px;
}

.bar {
    width: 100%;
    height: 16px;
    background: #334155;
    border-radius: 999px;
    margin-top: 16px;
    overflow: hidden;
}

.bar-fill {
    height: 100%;
    width: 0%;
    background: var(--primary);
    transition: width 0.4s;
}

.streak-mini {
    background: var(--card);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 18px;
    box-shadow: 0 6px 18px var(--shadow);
    width: 170px;
    margin-left: auto;
}

.streak-top {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 10px;
}

.mini-bar {
    width: 100%;
    height: 10px;
    background: #334155;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 8px;
}

.mini-fill {
    height: 100%;
    width: 0%;
    background: var(--primary);
    transition: width 0.4s;
}

.mini-text {
    font-size: 14px;
    color: var(--sub);
}

button {
    border: none;
    border-radius: 18px;
    padding: 17px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
}

.dark-button,
.reset,
.flip-button,
.audio-button {
    width: 100%;
    margin-bottom: 12px;
}

.primary { background: var(--primary); color: white; }
.audio { background: #7c3aed; color: white; }
.good { background: #22c55e; color: white; }
.bad { background: #ef4444; color: white; }
.secondary { background: #e5e7eb; color: #111827; }
.dark-button { background: #111827; color: white; }

.controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.answer-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
}

select {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    border-radius: 18px;
    border: none;
    margin-bottom: 18px;
    background: var(--card);
    color: var(--text);
}

.card-scene {
    perspective: 1000px;
    margin-bottom: 18px;
}

.card {
    position: relative;
    width: 100%;
    min-height: 230px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.card.flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    inset: 0;
    background: var(--card);
    border-radius: 28px;
    padding: 34px 20px;
    min-height: 180px;
    box-shadow: 0 8px 22px var(--shadow);
    display: flex;
    flex-direction: column;
    justify-content: center;
    backface-visibility: hidden;
}

.card-back {
    transform: rotateY(180deg);
}

.hint {
    font-size: 44px;
    font-weight: 900;
}

.answer {
    font-size: 32px;
    color: var(--primary);
    margin-bottom: 18px;
}

.front {
    font-size: 34px;
}

.front.rtl {
    direction: rtl;
}

.front.ltr {
    direction: ltr;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    font-size: 17px;
}

.stat-number {
    display: block;
    font-size: 24px;
    font-weight: 800;
    margin-top: 4px;
}

@keyframes sealIdle {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-7px) rotate(1deg); }
}

.mascot-img.happy {
    animation: happySeal 0.6s ease;
}

.mascot-img.sad {
    animation: sadSeal 0.45s ease;
}

@keyframes happySeal {
    0% { transform: scale(1); }
    40% { transform: scale(1.12) rotate(-4deg); }
    75% { transform: scale(1.06) rotate(4deg); }
    100% { transform: scale(1); }
}

@keyframes sadSeal {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-5px); }
}

</style>
</head>

<body>

<header>
🦭 Robben Lernen
</header>

<main class="app">

<section class="mascot-box">

<div class="mascot-layout">

<img
    id="sealMascot"
    class="mascot-img"
    src="/static/seal-gang.png"
    alt="Robbe"
>

<div class="speech">

<strong id="sealMessageTitle">
Lets go!
</strong>

<span id="sealMessageText">
Weiter lernen = stärker werden 💜
</span>

</div>

</div>

</section>

<section class="level-box">

<div id="sealTitle" class="level-title">
Babyrobbe
</div>

<div id="sealLevel" class="level-sub">
Level 1
</div>

<div class="bar">
<div class="bar-fill" id="xpBar"></div>
</div>

<div id="nextLevelText" class="level-sub">
100 XP bis Schwimmrobbe
</div>

</section>

<section class="streak-mini">

<div class="streak-top">
🔥 <span id="streakDays">0</span> Tage
</div>

<div class="mini-bar">
<div class="mini-fill" id="dailyBar"></div>
</div>

<div id="dailyGoalText" class="mini-text">
0 / 5 heute
</div>

</section>

<button class="dark-button" onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<select id="language" onchange="changeLanguage()">
<option value="farsi">🇮🇷 Farsi</option>
<option value="greek">🇬🇷 Griechisch</option>
</select>

<select id="category" onchange="loadCard()">
<option value="all">▦ Alle Kategorien</option>
<option value="greeting">Begrüßung</option>
<option value="farewell">Verabschiedung</option>
<option value="food">Essen/Trinken</option>
<option value="basic">Basis</option>
<option value="daily">Alltag</option>
<option value="sentences">Ganze Sätze</option>
</select>

<section class="card-scene">

<div class="card" id="card">

<div class="card-face card-front">

<div id="hint" class="hint"></div>

</div>

<div class="card-face card-back">

<div id="answer" class="answer"></div>

<div id="front" class="front"></div>

</div>

</div>

</section>

<button class="primary flip-button" onclick="showAnswer()">
Karte umdrehen
</button>

<div class="controls">

<button class="audio" onclick="speakWord()">
🔊 Aussprache
</button>

<button class="primary" onclick="loadCard()">
↻ Neue Karte
</button>

</div>

<div class="answer-controls">

<button class="good" onclick="rate(1)">
👍 Richtig
</button>

<button class="bad" onclick="rate(3)">
👎 Falsch
</button>

</div>

<div class="controls">

<button class="secondary" onclick="toggleTestMode()">
🧠 Testmodus
</button>

<button class="secondary" onclick="resetKnownCards()">
♻️ Test reset
</button>

</div>

<section class="stats">

<div>
⭐ XP
<span id="xp" class="stat-number">0</span>
</div>

<div>
✅ Richtig
<span id="correct" class="stat-number">0</span>
</div>

<div>
❌ Falsch
<span id="wrong" class="stat-number">0</span>
</div>

</section>

</main>

<script>

let currentCard = null;

let testMode = false;

let selectedLanguage =
    localStorage.getItem("selectedLanguage") || "farsi";

let knownCards = JSON.parse(
    localStorage.getItem("knownCards") || "[]"
);

let progress = {
    xp: 0,
    correct: 0,
    wrong: 0,
    streak: 0,
    dailyCorrect: 0,
    lastDay: ""
};

const levels = [
    { xp: 0, title: "Babyrobbe", level: 1 },
    { xp: 100, title: "Schwimmrobbe", level: 2 },
    { xp: 300, title: "Eisrobbe", level: 3 },
    { xp: 600, title: "Jagdrobbe", level: 4 },
    { xp: 1000, title: "Meisterrobbe", level: 5 }
];

function getKnownKey() {
    return "knownCards_" + selectedLanguage;
}

function loadKnownCards() {
    knownCards = JSON.parse(
        localStorage.getItem(getKnownKey()) || "[]"
    );
}

function saveKnownCards() {
    localStorage.setItem(
        getKnownKey(),
        JSON.stringify(knownCards)
    );
}

function setSealMessage(title, text) {
    document.getElementById("sealMessageTitle").innerText = title;
    document.getElementById("sealMessageText").innerText = text;
}

function animateSeal(type) {
    const seal = document.getElementById("sealMascot");
    seal.classList.remove("happy", "sad");
    void seal.offsetWidth;
    seal.classList.add(type);

    setTimeout(() => {
        seal.classList.remove(type);
    }, 700);
}

function changeLanguage() {
    selectedLanguage =
        document.getElementById("language").value;

    localStorage.setItem(
        "selectedLanguage",
        selectedLanguage
    );

    loadKnownCards();

    setSealMessage(
        "Sprache gewechselt!",
        selectedLanguage === "greek"
            ? "Griechisch ist jetzt aktiv 🇬🇷"
            : "Farsi ist jetzt aktiv 🇮🇷"
    );

    loadCard();
}

function toggleTestMode() {
    testMode = !testMode;

    if (testMode) {
        setSealMessage(
            "Testmodus aktiv!",
            "Nur bekannte Karten 🧠"
        );
    } else {
        setSealMessage(
            "Normalmodus",
            "Alle Karten aktiv 🦭"
        );
    }

    loadCard();
}

function resetKnownCards() {
    knownCards = [];
    saveKnownCards();

    setSealMessage(
        "Test reset!",
        "Bekannte Karten gelöscht 🌊"
    );
}

function checkDailyProgress() {
    const today =
        new Date().toDateString();

    if (progress.lastDay !== today) {
        const yesterday =
            new Date();

        yesterday.setDate(
            yesterday.getDate() - 1
        );

        if (
            progress.lastDay ===
            yesterday.toDateString()
        ) {
            progress.streak += 1;
        } else if (progress.lastDay !== "") {
            progress.streak = 1;
        }

        progress.dailyCorrect = 0;
        progress.lastDay = today;
        saveProgress();
    }

    document.getElementById("streakDays").innerText =
        progress.streak;

    const percent =
        Math.min(
            (progress.dailyCorrect / 5) * 100,
            100
        );

    document.getElementById("dailyBar").style.width =
        percent + "%";

    document.getElementById("dailyGoalText").innerText =
        progress.dailyCorrect +
        " / 5 heute";
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");

    localStorage.setItem(
        "robbenDarkMode",
        document.body.classList.contains("dark")
    );
}

function loadDarkMode() {
    const dark =
        localStorage.getItem("robbenDarkMode");

    if (dark === "true") {
        document.body.classList.add("dark");
    }
}

function getProgressKey() {
    return "robbenProgress_" + selectedLanguage;
}

function loadProgress() {
    const saved =
        localStorage.getItem(getProgressKey());

    if (saved) {
        progress = JSON.parse(saved);
    }

    updateStats();
    checkDailyProgress();
}

function saveProgress() {
    localStorage.setItem(
        getProgressKey(),
        JSON.stringify(progress)
    );
}

function updateLevel() {
    let current = levels[0];
    let next = null;

    for (let i = 0; i < levels.length; i++) {
        if (progress.xp >= levels[i].xp) {
            current = levels[i];
            next = levels[i + 1] || null;
        }
    }

    document.getElementById("sealTitle").innerText =
        current.title;

    document.getElementById("sealLevel").innerText =
        "Level " + current.level;

    if (next) {
        const currentXP =
            progress.xp - current.xp;

        const neededXP =
            next.xp - current.xp;

        const percent =
            Math.min((currentXP / neededXP) * 100, 100);

        document.getElementById("xpBar").style.width =
            percent + "%";

        document.getElementById("nextLevelText").innerText =
            (next.xp - progress.xp) +
            " XP bis " +
            next.title;
    }
}

function updateStats() {
    document.getElementById("xp").innerText =
        progress.xp;

    document.getElementById("correct").innerText =
        progress.correct;

    document.getElementById("wrong").innerText =
        progress.wrong;

    updateLevel();
}

async function loadCard() {
    const category =
        document.getElementById("category").value;

    let url = "/next/" + selectedLanguage;

    if (category !== "all") {
        url = "/next/" + selectedLanguage + "/" + category;
    }

    let tries = 0;
    let data = null;

    while (tries < 20) {
        const res = await fetch(url);
        data = await res.json();

        if (!testMode) {
            break;
        }

        if (knownCards.includes(data.id)) {
            break;
        }

        tries++;
    }

    if (testMode && data && !knownCards.includes(data.id)) {
        setSealMessage(
            "Keine Testkarten",
            "Lerne zuerst Karten mit 👍"
        );
    }

    currentCard = data;

    document.getElementById("hint").innerText =
        data.hint || "";

    document.getElementById("answer").innerText =
        data.back || "";

    const front =
        document.getElementById("front");

    front.innerText =
        data.front || "";

    front.classList.remove("rtl", "ltr");

    if (selectedLanguage === "farsi") {
        front.classList.add("rtl");
    } else {
        front.classList.add("ltr");
    }

    document.getElementById("card")
        .classList.remove("flipped");
}

function showAnswer() {
    if (currentCard == null) {
        return;
    }

    document.getElementById("card")
        .classList.toggle("flipped");
}

function speakWord() {
    if (currentCard == null || !currentCard.hint) {
        return;
    }

    window.speechSynthesis.cancel();

    const utterance =
        new SpeechSynthesisUtterance(currentCard.hint);

    utterance.lang =
        selectedLanguage === "greek" ? "el-GR" : "de-DE";

    utterance.rate = 0.75;

    window.speechSynthesis.speak(utterance);
}

async function rate(value) {
    await fetch("/rate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            rating: value,
            card: currentCard
        })
    });

    if (value === 1) {
        progress.xp += 10;
        progress.correct += 1;
        progress.dailyCorrect += 1;

        if (!knownCards.includes(currentCard.id)) {
            knownCards.push(currentCard.id);
            saveKnownCards();
        }

        animateSeal("happy");

        setSealMessage(
            "Sehr stark!",
            "Die Robbe ist stolz 🔥"
        );
    } else {
        progress.xp -= 2;
        progress.wrong += 1;

        animateSeal("sad");

        setSealMessage(
            "Nicht schlimm!",
            "Nochmal versuchen 🦭"
        );
    }

    if (progress.xp < 0) {
        progress.xp = 0;
    }

    saveProgress();
    updateStats();
    checkDailyProgress();
    loadCard();
}

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register(
        "/static/service-worker.js"
    );
}

document.getElementById("language").value =
    selectedLanguage;

setSealMessage(
    "Lets go!",
    "Weiter lernen = stärker werden 💜"
);

loadDarkMode();
loadKnownCards();
loadProgress();
loadCard();

</script>

</body>
</html>
